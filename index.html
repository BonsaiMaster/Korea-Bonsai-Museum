<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korea Bonsai Museum - Specimen Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 24px;
      padding: 24px;
    }

    .hero img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 12px;
      background: #eee;
    }

    .title {
      margin: 0 0 8px 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 8px 0;
      color: #666;
      font-size: 15px;
    }

    .subtitle2 {
      margin: 0 0 18px 0;
      color: #444;
      font-size: 18px;
      font-weight: 600;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .info-box {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .label {
      display: block;
      font-size: 12px;
      color: #777;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      word-break: break-word;
    }

    .section {
      padding: 0 24px 24px 24px;
    }

    .section h2 {
      margin: 24px 0 10px 0;
      font-size: 22px;
    }

    .section p {
      line-height: 1.65;
      color: #333;
      white-space: pre-line;
    }

    .care-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .care-card {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 16px;
    }

    .status {
      padding: 18px 24px;
      font-size: 14px;
      color: #555;
      background: #fff8e1;
      border-bottom: 1px solid #eee;
    }

    .error {
      background: #fdecea;
      color: #b3261e;
    }

    .footer {
      text-align: center;
      padding: 24px;
      color: #666;
      font-size: 14px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    @media (max-width: 800px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .info-grid,
      .care-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="status" class="status">Loading specimen data...</div>

      <div class="hero">
        <div>
          <img id="specimenImage" src="" alt="Bonsai specimen image" />
        </div>

        <div>
          <h1 id="englishName" class="title">Loading...</h1>
          <p id="koreanName" class="subtitle2"></p>
          <p id="treeIdText" class="subtitle"></p>

          <div class="info-grid">
            <div class="info-box">
              <span class="label">Price</span>
              <span id="price" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Style</span>
              <span id="style" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Age</span>
              <span id="age" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Repotting</span>
              <span id="repotting" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Height</span>
              <span id="height" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Width</span>
              <span id="width" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Depth</span>
              <span id="depth" class="value"></span>
            </div>

            <div class="info-box">
              <span class="label">Latin Name</span>
              <span id="latinName" class="value"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Care Guide</h2>
        <div class="care-grid">
          <div class="care-card">
            <h3>Summary</h3>
            <p id="careSummary"></p>
          </div>

          <div class="care-card">
            <h3>Light</h3>
            <p id="careLight"></p>
          </div>

          <div class="care-card">
            <h3>Watering</h3>
            <p id="careWatering"></p>
          </div>

          <div class="care-card">
            <h3>Substrate</h3>
            <p id="careSubstrate"></p>
          </div>

          <div class="care-card">
            <h3>Feeding</h3>
            <p id="careFeeding"></p>
          </div>

          <div class="care-card">
            <h3>Notes</h3>
            <p id="careNotes"></p>
          </div>
        </div>
      </div>

      <div class="footer">Korea Bonsai Museum</div>
    </div>
  </div>

  <script>
    const JSON_URL = "https://script.google.com/macros/s/AKfycbxdmV3mWsHBxfqME9p89-OY8onWTZzOWX-Ibe6thxa_K6CExy0Skm_QUcMk8HPwajI/exec";

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function safeText(value, fallback = "") {
      if (value === null || value === undefined) return fallback;
      return String(value).trim();
    }

    function formatPriceKRW(value) {
      if (value === null || value === undefined || value === "") return "";
      const numeric = Number(String(value).replace(/[^0-9.-]/g, ""));
      if (isNaN(numeric)) return safeText(value);
      return "KRW" + numeric.toLocaleString("en-US");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDimension(value) {
      if (value === null || value === undefined || value === "") return "";
      return `${value} cm`;
    }

    function setText(id, value, fallback = "") {
      const el = document.getElementById(id);
      if (el) el.textContent = value || fallback;
    }

    function setImage(id, src, altText) {
      const el = document.getElementById(id);
      if (!el) return;
      if (src) {
        el.src = src;
        el.alt = altText || "Specimen image";
      } else {
        el.style.display = "none";
      }
    }

    function showStatus(message, isError = false) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = isError ? "status error" : "status";
    }

    function normalizeKey(key) {
      return String(key || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_")
        .replace(/[()]/g, "");
    }

    function getValue(obj, possibleKeys) {
      if (!obj) return "";

      const keyMap = {};
      Object.keys(obj).forEach((k) => {
        keyMap[normalizeKey(k)] = obj[k];
      });

      for (const key of possibleKeys) {
        const normalized = normalizeKey(key);
        if (normalized in keyMap && keyMap[normalized] !== "") {
          return keyMap[normalized];
        }
      }

      return "";
    }

    function findSpecimenByTreeId(data, requestedId) {
      if (!Array.isArray(data)) return null;
      if (!requestedId) return null;

      const target = String(requestedId).trim().toUpperCase();

      return data.find((item) => {
        const possibleId = getValue(item, [
          "Tree ID",
          "tree_id",
          "tree id",
          "id",
          "specimen_id"
        ]) || "";

        return String(possibleId).trim().toUpperCase() === target;
      }) || null;
    }

    function renderSpecimen(specimen, requestedId) {
      const treeId = getValue(specimen, ["Tree ID", "tree_id", "tree id", "id"]);
      const englishName = getValue(specimen, ["English Name", "english_name", "english name", "name"]);
      const koreanName = getValue(specimen, ["Species", "Korean Name", "korean_name", "korean name"]);
      const latinName = getValue(specimen, ["Latin Name", "latin_name", "latin name"]);
      const price = getValue(specimen, ["price_krw", "price"]);
      const style = getValue(specimen, ["Style", "style"]);
      const age = getValue(specimen, ["Estimated Age Input", "age"]);
      const repotting = getValue(specimen, ["repotting"]);
      const height = getValue(specimen, ["Height (CM)", "height"]);
      const width = getValue(specimen, ["Width (CM)", "width"]);
      const depth = getValue(specimen, ["Depth (CM)", "depth"]);
      const specimenImage = getValue(specimen, ["specimen_image", "RAW_DRIVE_IMAGE LINK", "image"]);
      const careSummary = getValue(specimen, ["care_summary"]);
      const careLight = getValue(specimen, ["care_light"]);
      const careWatering = getValue(specimen, ["care_watering"]);
      const careSubstrate = getValue(specimen, ["care_substrate"]);
      const careFeeding = getValue(specimen, ["care_feeding"]);
      const careNotes = getValue(specimen, ["care_notes"]);

      setText("englishName", safeText(englishName, "Unnamed specimen"));
      setText("koreanName", safeText(koreanName));
      setText("treeIdText", treeId ? `Tree ID: ${treeId}` : `Requested ID: ${requestedId || ""}`);

      setText("price", formatPriceKRW(price));
      setText("style", safeText(style));
      setText("age", age ? `${age} years` : "");
      setText("repotting", formatDate(repotting));
      setText("height", formatDimension(height));
      setText("width", formatDimension(width));
      setText("depth", formatDimension(depth));
      setText("latinName", safeText(latinName));

      setText("careSummary", safeText(careSummary));
      setText("careLight", safeText(careLight));
      setText("careWatering", safeText(careWatering));
      setText("careSubstrate", safeText(careSubstrate));
      setText("careFeeding", safeText(careFeeding));
      setText("careNotes", safeText(careNotes));

      setImage("specimenImage", specimenImage, englishName);

      showStatus("Specimen loaded successfully.");
    }

    async function loadSpecimen() {
      const requestedId = getQueryParam("id");

      if (!requestedId) {
        showStatus("No specimen ID provided in the URL. Example: ?id=KBM-0001", true);
        return;
      }

      try {
        showStatus("Loading specimen data...");

        const response = await fetch(JSON_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} while loading JSON from: ${JSON_URL}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("JSON loaded, but the root format is not an array.");
        }

        const specimen = findSpecimenByTreeId(data, requestedId);

        if (!specimen) {
          showStatus(`No specimen found for ID: ${requestedId}`, true);
          return;
        }

        renderSpecimen(specimen, requestedId);

      } catch (error) {
        showStatus("Unable to load specimen profile: " + error.message, true);
      }
    }

    loadSpecimen();
  </script>
</body>
</html>
