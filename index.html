<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBM Test</title>
  <style>
    body {
      <h1 style="color:red;">TEST VERSION 2</h1>;
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f7f7f7;
    }
    .box {
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 12px;
      max-width: 700px;
      margin: 0 auto;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f3f3f3;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>KBM Test Page</h1>
    <div id="status">Script started...</div>
    <pre id="output"></pre>
  </div>

  <script>
    const REMOTE_JSON_URL = "https://script.google.com/macros/s/AKfycbwJomCmJ366O6rvSC90xxqfWI2kqvCGqRvdaTkVuPZUEYqLD4xubHs4z2-Tzr8i0x4/exec";

    async function init() {
      const status = document.getElementById("status");
      const output = document.getElementById("output");

      try {
        status.textContent = "Fetching JSON...";

        const response = await fetch(REMOTE_JSON_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        status.textContent = "JSON loaded successfully.";

        if (!Array.isArray(data) || data.length === 0) {
          output.textContent = "No data returned.";
          return;
        }

        const first = data[0];

        output.textContent =
          "First specimen loaded successfully:\n\n" +
          "ID: " + (first.tree_id || first.id || "") + "\n" +
          "English Name: " + (first.english_name || first.name_en || "") + "\n" +
          "Height: " + (first["height_(cm)"] || first.height_cm || "") + "\n" +
          "Width: " + (first["width_(cm)"] || first.width_cm || "") + "\n" +
          "Depth: " + (first["depth_(cm)"] || first.depth_cm || "") + "\n\n" +
          "Full object:\n" +
          JSON.stringify(first, null, 2);
      } catch (error) {
        status.textContent = "Error while loading data.";
        output.textContent = error.message;
        console.error(error);
      }
    }

    init();
  </script>
</body>
</html>
