<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korea Bonsai Museum - Specimen Profile</title>
  <style>
    :root {
      --bg: #f3f0e8;
      --card: #fcfbf7;
      --border: #ded7c8;
      --text: #2f312b;
      --muted: #6f7168;
      --accent: #8e8772;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
      gap: 0;
      min-height: 640px;
    }

    .image-panel {
      background: #ebe6dc;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-panel img {
      width: 100%;
      max-height: 760px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      background: #e5e0d6;
    }

    .content-panel {
      padding: 54px 46px 42px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .museum-mark {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 40px;
      font-weight: 500;
      line-height: 1.15;
      color: var(--text);
    }

    .korean-name {
      margin: 12px 0 18px;
      font-size: 22px;
      color: var(--muted);
      font-weight: 500;
    }

    .tree-id {
      margin: 0 0 28px;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .details-list {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .detail-row {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 20px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(222, 215, 200, 0.6);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      padding-top: 3px;
    }

    .detail-value {
      font-size: 18px;
      color: var(--text);
    }

    .section {
      padding: 0 46px 40px;
    }

    .section-title {
      margin: 0 0 22px;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
    }

    .care-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 18px;
    }

    .care-card {
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 20px 18px;
    }

    .care-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .care-card p {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
      white-space: pre-line;
    }

    .footer {
      text-align: center;
      padding: 26px 20px 30px;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }

    .error-box {
      max-width: 900px;
      margin: 60px auto;
      background: var(--card);
      border: 1px solid #d8b9b9;
      color: #8b3d3d;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      font-family: Arial, sans-serif;
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .content-panel {
        padding: 34px 24px 30px;
      }

      .section {
        padding: 0 24px 30px;
      }

      .care-grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 32px;
      }

      .detail-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="app"></div>
  </div>

  <script>
    const JSON_URL = "https://script.google.com/macros/s/AKfycbwBLnlNU8miAjZMAZiuZBScioCfuUx3zE72Weyg1iC8AdH9WpPUpuT33WPzCeyH8So/exec";

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function safeText(value, fallback = "") {
      if (value === null || value === undefined || value === "") return fallback;
      return String(value).trim();
    }

    function formatPriceKRW(value) {
      if (value === null || value === undefined || value === "") return "";
      const numeric = Number(String(value).replace(/[^0-9.-]/g, ""));
      if (isNaN(numeric)) return safeText(value);
      return "KRW" + numeric.toLocaleString("en-US");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDimension(value) {
      if (value === null || value === undefined || value === "") return "";
      return `${value} cm`;
    }

    function normalizeKey(key) {
      return String(key || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_")
        .replace(/[()]/g, "");
    }

    function getValue(obj, possibleKeys) {
      if (!obj) return "";

      const keyMap = {};
      Object.keys(obj).forEach((k) => {
        keyMap[normalizeKey(k)] = obj[k];
      });

      for (const key of possibleKeys) {
        const normalized = normalizeKey(key);
        if (normalized in keyMap && keyMap[normalized] !== "") {
          return keyMap[normalized];
        }
      }

      return "";
    }

    function findSpecimenByTreeId(data, requestedId) {
      if (!Array.isArray(data) || !requestedId) return null;

      const target = String(requestedId).trim().toUpperCase();

      return data.find((item) => {
        const possibleId = getValue(item, [
          "Tree ID",
          "tree_id",
          "tree id",
          "id",
          "specimen_id"
        ]) || "";

        return String(possibleId).trim().toUpperCase() === target;
      }) || null;
    }

    function renderDetailRow(label, value) {
      if (!value) return "";
      return `
        <div class="detail-row">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `;
    }

    function renderSpecimen(specimen, requestedId) {
      const treeId = getValue(specimen, ["Tree ID", "tree_id", "tree id", "id"]);
      const englishName = getValue(specimen, ["English Name", "english_name", "english name", "name"]);
      const koreanName = getValue(specimen, ["Species", "Korean Name", "korean_name", "korean name"]);
      const latinName = getValue(specimen, ["Latin Name", "latin_name", "latin name"]);
      const price = getValue(specimen, ["price_krw", "price"]);
      const style = getValue(specimen, ["Style", "style"]);
      const age = getValue(specimen, ["Estimated Age Input", "age"]);
      const repotting = getValue(specimen, ["repotting"]);
      const height = getValue(specimen, ["Height (CM)", "height"]);
      const width = getValue(specimen, ["Width (CM)", "width"]);
      const depth = getValue(specimen, ["Depth (CM)", "depth"]);
      const specimenImage = getValue(specimen, ["specimen_image", "image"]);
      const careSummary = getValue(specimen, ["care_summary"]);
      const careLight = getValue(specimen, ["care_light"]);
      const careWatering = getValue(specimen, ["care_watering"]);
      const careSubstrate = getValue(specimen, ["care_substrate"]);
      const careFeeding = getValue(specimen, ["care_feeding"]);
      const careNotes = getValue(specimen, ["care_notes"]);

      const detailsHtml = [
        renderDetailRow("Latin Name", safeText(latinName)),
        renderDetailRow("Age", age ? `${age} years` : ""),
        renderDetailRow("Style", safeText(style)),
        renderDetailRow("Height", formatDimension(height)),
        renderDetailRow("Width", formatDimension(width)),
        renderDetailRow("Depth", formatDimension(depth)),
        renderDetailRow("Repotting", formatDate(repotting)),
        renderDetailRow("Price", formatPriceKRW(price))
      ].join("");

      const careCards = [
        { title: "Summary", text: safeText(careSummary) },
        { title: "Light", text: safeText(careLight) },
        { title: "Watering", text: safeText(careWatering) },
        { title: "Substrate", text: safeText(careSubstrate) },
        { title: "Feeding", text: safeText(careFeeding) },
        { title: "Notes", text: safeText(careNotes) }
      ]
      .filter(item => item.text)
      .map(item => `
        <div class="care-card">
          <h3>${item.title}</h3>
          <p>${item.text}</p>
        </div>
      `)
      .join("");

      document.getElementById("app").innerHTML = `
        <div class="card">
          <div class="hero">
            <div class="image-panel">
              <img src="${specimenImage || ""}" alt="${safeText(englishName, "Specimen image")}" />
            </div>

            <div class="content-panel">
              <div class="museum-mark">Korea Bonsai Museum</div>
              <h1 class="title">${safeText(englishName, "Unnamed specimen")}</h1>
              ${koreanName ? `<div class="korean-name">${koreanName}</div>` : ""}
              <p class="tree-id">Tree ID: ${treeId || requestedId || ""}</p>

              <div class="details-list">
                ${detailsHtml}
              </div>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Care Guide</h2>
            <div class="care-grid">
              ${careCards}
            </div>
          </div>

          <div class="footer">Korea Bonsai Museum</div>
        </div>
      `;
    }

    function renderError(message) {
      document.getElementById("app").innerHTML = `
        <div class="error-box">
          <strong>Unable to load specimen profile.</strong><br><br>
          ${message}
        </div>
      `;
    }

    async function loadSpecimen() {
      const requestedId = getQueryParam("id");

      if (!requestedId) {
        renderError('No specimen ID provided in the URL. Example: ?id=KBM-0001');
        return;
      }

      try {
        const response = await fetch(JSON_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} while loading JSON from: ${JSON_URL}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("JSON loaded, but the root format is not an array.");
        }

        const specimen = findSpecimenByTreeId(data, requestedId);

        if (!specimen) {
          renderError(`No specimen found for ID: ${requestedId}`);
          return;
        }

        renderSpecimen(specimen, requestedId);
      } catch (error) {
        renderError(error.message);
      }
    }

    loadSpecimen();
  </script>
</body>
</html>
