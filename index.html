<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Specimen Profile | Korea Bonsai Museum</title>
  <style>
    :root {
      --museum-green: #183126;
      --museum-green-2: #244536;
      --soft-gold: #b79255;
      --parchment: #fbfaf7;
      --paper: #ffffff;
      --text-dark: #243028;
      --text-soft: #627166;
      --line: #e8e3d8;
      --shadow: 0 20px 50px rgba(19, 33, 26, 0.08);
      --radius: 22px;
      --radius-sm: 14px;
      --max: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      color: var(--text-dark);
      background:
        radial-gradient(circle at top left, rgba(183,146,85,0.08), transparent 30%),
        linear-gradient(180deg, #f4f2ec 0%, #f6f4ef 100%);
      min-height: 100vh;
    }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .shell {
      background: var(--parchment);
      border: 1px solid rgba(183,146,85,0.18);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top-bar {
      height: 6px;
      background: linear-gradient(90deg, var(--museum-green), var(--soft-gold));
    }

    .museum-header {
      padding: 18px 26px 0;
      text-align: center;
    }

    .museum-header .eyebrow {
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.74rem;
      color: var(--soft-gold);
      margin-bottom: 10px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      padding: 24px 24px 8px;
    }

    .hero-card,
    .side-card,
    .panel {
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .hero-media {
      aspect-ratio: 4 / 3;
      background: #ece8df;
      overflow: hidden;
      position: relative;
    }

    .hero-media img,
    .style-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-body {
      padding: 24px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-block h1 {
      margin: 0;
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 0.95;
      color: var(--museum-green);
      font-weight: 600;
    }

    .korean-name {
      margin-top: 10px;
      font-size: 1.15rem;
      color: #4d5a53;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    .latin-name {
      margin-top: 6px;
      font-size: 1rem;
      font-style: italic;
      color: #7b867e;
    }

    .price-pill {
      white-space: nowrap;
      background: linear-gradient(180deg, #f4ead8, #f1e3ca);
      color: #6f562a;
      border: 1px solid rgba(183,146,85,0.25);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .description {
      margin-top: 18px;
      color: var(--text-soft);
      font-size: 0.98rem;
      line-height: 1.75;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .tag {
      padding: 9px 12px;
      border-radius: 999px;
      background: #f2f5f2;
      color: #395142;
      border: 1px solid #dde7df;
      font-size: 0.88rem;
    }

    .side-card {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 22px;
    }

    .spec {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px;
    }

    .spec-label {
      display: block;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--soft-gold);
      margin-bottom: 8px;
    }

    .spec-value {
      font-size: 1rem;
      color: var(--text-dark);
      line-height: 1.45;
      font-weight: 500;
    }

    .registry {
      margin: 0 22px 22px;
      padding: 16px 18px;
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, #1f3a2d, #183126);
      color: #eef5f0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .registry small {
      display: block;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .content {
      padding: 8px 24px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .panel-header {
      padding: 18px 20px 0;
    }

    .panel-title {
      margin: 0;
      font-size: 0.82rem;
      color: var(--soft-gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .panel-body {
      padding: 18px 20px 22px;
    }

    .panel-body p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.75;
      font-size: 0.97rem;
    }

    .style-layout {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 18px;
      align-items: stretch;
    }

    .style-media {
      min-height: 230px;
      background: #ece8df;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .care-list {
      display: grid;
      gap: 12px;
    }

    .care-item {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 15px;
    }

    .care-item strong {
      display: block;
      color: var(--museum-green);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .care-item span {
      color: var(--text-soft);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .footer {
      text-align: center;
      padding: 8px 24px 30px;
      color: #9c9b94;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }

    .empty-image {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: #a6a095;
      font-size: 0.95rem;
      padding: 20px;
      text-align: center;
    }

    .loading,
    .error {
      max-width: 760px;
      margin: 80px auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .error {
      color: #8a2f2f;
    }

    @media (max-width: 900px) {
      .hero,
      .content,
      .style-layout {
        grid-template-columns: 1fr;
      }

      .spec-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 12px 10px 24px;
      }

      .museum-header {
        padding: 16px 16px 0;
      }

      .hero {
        padding: 16px 16px 6px;
      }

      .content {
        padding: 6px 16px 16px;
      }

      .spec-grid {
        grid-template-columns: 1fr;
      }

      .hero-body,
      .panel-body {
        padding: 16px;
      }

      .panel-header {
        padding: 16px 16px 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="app" class="loading">Loading specimen profile...</div>
  </div>

  <script>
    const REMOTE_JSON_URL = "https://script.google.com/macros/s/AKfycbwmf06HYc8kQuT-VjIyHVO9_8Tv2A2FHdUlqRodbZtPM69t2-3R88jqH0jizYfNqmQ/exec";
    const DEFAULT_ID = "KBM-0001";

    const STYLE_GUIDES = {
      Chokkan: {
        title: "Formal Upright",
        text: "Chokkan expresses dignity, strength, and balance. The trunk rises vertically with clear taper from base to apex, while branches are arranged in an ordered and harmonious structure. This style highlights discipline, stability, and classical bonsai aesthetics."
      },
      Moyogi: {
        title: "Informal Upright",
        text: "Moyogi keeps an upright spirit while allowing natural movement in the trunk. Curves create softness and a more organic character, suggesting a tree shaped by time and environment rather than strict symmetry."
      },
      Shakan: {
        title: "Slanting",
        text: "Shakan presents a trunk leaning to one side, as if responding to wind, light, or slope. The composition conveys tension, resilience, and directional energy while remaining visually balanced."
      },
      Kengai: {
        title: "Cascade",
        text: "Kengai imitates a tree growing from a cliff edge, with the trunk descending below the rim of the container. It is dramatic, expressive, and often used to show endurance in harsh natural conditions."
      },
      "Han-kengai": {
        title: "Semi-Cascade",
        text: "Han-kengai suggests a tree shaped by gravity and exposure, but with a gentler descent than full cascade. It balances movement and stability in an elegant way."
      },
      Yose-ue: {
        title: "Forest",
        text: "Yose-ue uses multiple trees to recreate the atmosphere of a small woodland. The focus is not only on each tree, but on spacing, perspective, rhythm, and the natural relationship between trunks."
      },
      Bunjingi: {
        title: "Literati",
        text: "Bunjingi values minimalism, line, and poetic movement. It often features a slender trunk with sparse foliage, expressing refinement, age, and artistic restraint."
      },
      Hokidachi: {
        title: "Broom",
        text: "Hokidachi is characterized by an upright trunk that branches out evenly like a broom. It works especially well for deciduous species and highlights fine ramification."
      }
    };

    const CARE_GUIDES = {
      "Pinus thunbergii": {
        summary: "Japanese Black Pine prefers strong light, sharp drainage, and a disciplined seasonal maintenance rhythm.",
        light: "Full sun is strongly recommended. It needs abundant light to maintain compact needles and strong budding.",
        water: "Water thoroughly, then allow the substrate to approach slight dryness before watering again. Avoid keeping the root ball constantly wet.",
        substrate: "A fast-draining mineral mix is ideal. A common bonsai mix is akadama, pumice, and lava rock, adjusted to climate and pot size.",
        feeding: "Feed during the active growing season with a balanced fertilizer, reducing intensity during peak summer stress.",
        notes: "General care guide only. Refinement techniques such as decandling and needle balancing depend on the trees age, health, and stage of development."
      },
      "Pinus densiflora": {
        summary: "Korean Red Pine appreciates sun, good airflow, and a fast-draining mineral substrate.",
        light: "Provide full sun for healthy needle development and compact growth.",
        water: "Water thoroughly, then allow the substrate to dry slightly before watering again.",
        substrate: "Use a structured mineral bonsai soil with strong drainage and aeration.",
        feeding: "Feed regularly during active growth, while adjusting fertilizer strength to tree vigor.",
        notes: "Avoid heavy organic soil and prolonged water retention around the roots."
      },
      "Acer palmatum": {
        summary: "Japanese Maple values protection from excessive summer stress while maintaining even moisture and fine ramification.",
        light: "Bright light or morning sun is ideal. In hot weather, some afternoon protection helps prevent leaf scorch.",
        water: "Keep the substrate evenly moist but never stagnant. Maples dislike both drought stress and waterlogged roots.",
        substrate: "Use a well-draining mix with good moisture retention. Akadama-based blends are commonly used.",
        feeding: "Feed regularly during the growing season with moderate strength to support healthy shoots and leaf color.",
        notes: "Strong wind, severe heat, and abrupt drying can quickly damage tender foliage."
      },
      "Acer pseudosieboldianum": {
        summary: "Korean Maple benefits from stable moisture, seasonal feeding, and protection from excessive summer heat.",
        light: "Morning sun and light afternoon shade are often ideal in warmer periods.",
        water: "Keep the root ball evenly moist without allowing prolonged waterlogging.",
        substrate: "Use a well-draining mix with some moisture retention to support healthy roots.",
        feeding: "Apply balanced fertilizer throughout the growing season according to vigor.",
        notes: "Watch closely for leaf scorch during hot, dry, or windy periods."
      },
      "Carpinus turczaninowii": {
        summary: "Korean Hornbeam responds well to consistent moisture, strong seasonal pruning, and good light.",
        light: "Provide bright light with good air circulation. Some afternoon protection can help in peak summer heat.",
        water: "Do not let the substrate dry out completely. Water deeply and consistently.",
        substrate: "Use a draining bonsai mix that still retains enough moisture for active deciduous growth.",
        feeding: "Feed during the growing season to support ramification and leaf density.",
        notes: "Hornbeams are vigorous but appreciate careful summer water management."
      },
      DEFAULT: {
        summary: "This specimen should be grown with attention to balance: light, drainage, and seasonal maintenance are all important.",
        light: "Provide species-appropriate light with good air circulation.",
        water: "Water thoroughly when needed rather than lightly and frequently.",
        substrate: "Use a structured bonsai substrate that drains well and resists compaction.",
        feeding: "Apply fertilizer during the growing season according to vigor and development stage.",
        notes: "This is a general care guide and should be adjusted to local climate, pot size, and refinement stage."
      }
    };

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getStyleGuide(style, tree) {
      if (tree.style_title || tree.style_explanation) {
        return {
          title: tree.style_title || style || "Bonsai Style",
          text:
            tree.style_explanation ||
            "This specimen follows a bonsai style that contributes to its structure, rhythm, and visual identity."
        };
      }

      return STYLE_GUIDES[style] || {
        title: style || "Bonsai Style",
        text: "This specimen follows a bonsai style that contributes to its structure, rhythm, and visual identity."
      };
    }

    function getCareGuide(tree) {
      if (
        tree.care_summary ||
        tree.care_light ||
        tree.care_watering ||
        tree.care_substrate ||
        tree.care_feeding ||
        tree.care_notes
      ) {
        return {
          summary: tree.care_summary || "",
          light: tree.care_light || "",
          water: tree.care_watering || "",
          substrate: tree.care_substrate || "",
          feeding: tree.care_feeding || "",
          notes: tree.care_notes || ""
        };
      }

      return CARE_GUIDES[tree.name_latin] || CARE_GUIDES.DEFAULT;
    }

    async function fetchRemoteData() {
      const response = await fetch(REMOTE_JSON_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Could not load remote sheet data.");
      }
      return await response.json();
    }

    function renderImage(url, alt) {
      if (!url) {
        return `<div class="empty-image">Image not available</div>`;
      }
      return `<img src="${escapeHtml(url)}" alt="${escapeHtml(alt)}">`;
    }

    function renderSpecimen(tree) {
      const styleGuide = getStyleGuide(tree.style, tree);
      const care = getCareGuide(tree);

      return `
        <div class="shell">
          <div class="top-bar"></div>

          <div class="museum-header">
            <div class="eyebrow">Korea Bonsai Museum</div>
          </div>

          <section class="hero">
            <article class="hero-card">
              <div class="hero-media">
                ${renderImage(tree.specimen_image, `${tree.name_en} specimen image`)}
              </div>

              <div class="hero-body">
                <div class="title-row">
                  <div class="title-block">
                    <h1>${escapeHtml(tree.name_en || "Unknown Specimen")}</h1>
                    <div class="korean-name">${escapeHtml(tree.name_kr || "-")}</div>
                    <div class="latin-name">${escapeHtml(tree.name_latin || "-")}</div>
                  </div>
                  <div class="price-pill">${escapeHtml(tree.price || "Price on request")}</div>
                </div>

                <div class="description">
                  ${escapeHtml(tree.description || "No specimen description available yet.")}
                </div>

                <div class="tags">
                  <span class="tag">${escapeHtml(styleGuide.title)}</span>
                  <span class="tag">${escapeHtml(tree.size || "Size not specified")}</span>
                  <span class="tag">${escapeHtml(tree.age || "Age not specified")}</span>
                </div>
              </div>
            </article>

            <aside class="side-card">
              <div class="spec-grid">
                <div class="spec">
                  <span class="spec-label">Specimen ID</span>
                  <div class="spec-value">${escapeHtml(tree.id || "-")}</div>
                </div>
                <div class="spec">
                  <span class="spec-label">Style</span>
                  <div class="spec-value">${escapeHtml(tree.style || "-")}</div>
                </div>
                <div class="spec">
                  <span class="spec-label">Size</span>
                  <div class="spec-value">${escapeHtml(tree.size || "-")}</div>
                </div>
                <div class="spec">
                  <span class="spec-label">Estimated Age</span>
                  <div class="spec-value">${escapeHtml(tree.age || "-")}</div>
                </div>
                <div class="spec">
                  <span class="spec-label">Last Repotting</span>
                  <div class="spec-value">${escapeHtml(tree.repotting || "Not specified")}</div>
                </div>
                <div class="spec">
                  <span class="spec-label">Recent Care</span>
                  <div class="spec-value">${escapeHtml(tree.last_maintenance || "Not specified")}</div>
                </div>
              </div>

              <div class="registry">
                <div>
                  <small>Collection Registry</small>
                  <div>${escapeHtml(tree.id || "-")}</div>
                </div>
                <div>
                  <small>Price</small>
                  <div>${escapeHtml(tree.price || "-")}</div>
                </div>
              </div>
            </aside>
          </section>

          <section class="content">
            <article class="panel">
              <div class="panel-header">
                <h2 class="panel-title">Style Explanation</h2>
              </div>
              <div class="panel-body">
                <div class="style-layout">
                  <div class="style-media">
                    ${renderImage(tree.style_image, `${tree.style || "Bonsai style"} reference image`)}
                  </div>
                  <div>
                    <p>
                      <strong>${escapeHtml(styleGuide.title)}</strong><br><br>
                      ${escapeHtml(styleGuide.text)}
                    </p>
                  </div>
                </div>
              </div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <h2 class="panel-title">General Care Guide</h2>
              </div>
              <div class="panel-body">
                <div class="care-list">
                  <div class="care-item">
                    <strong>Overview</strong>
                    <span>${escapeHtml(care.summary)}</span>
                  </div>
                  <div class="care-item">
                    <strong>Light</strong>
                    <span>${escapeHtml(care.light)}</span>
                  </div>
                  <div class="care-item">
                    <strong>Watering</strong>
                    <span>${escapeHtml(care.water)}</span>
                  </div>
                  <div class="care-item">
                    <strong>Substrate</strong>
                    <span>${escapeHtml(care.substrate)}</span>
                  </div>
                  <div class="care-item">
                    <strong>Feeding</strong>
                    <span>${escapeHtml(care.feeding)}</span>
                  </div>
                  <div class="care-item">
                    <strong>Important Note</strong>
                    <span>${escapeHtml(care.notes)}</span>
                  </div>
                </div>
              </div>
            </article>
          </section>

          <div class="footer">© 2026 Korea Bonsai Museum</div>
        </div>
      `;
    }

    async function init() {
      const app = document.getElementById("app");

      try {
        const catalog = await fetchRemoteData();

        if (!Array.isArray(catalog) || catalog.length === 0) {
          app.className = "error";
          app.textContent = "No specimen data found.";
          return;
        }

        const requestedId = getQueryParam("id") || DEFAULT_ID;
        const tree = catalog.find(item => String(item.id) === String(requestedId)) || catalog[0];

        app.className = "";
        app.innerHTML = renderSpecimen(tree);
      } catch (error) {
        app.className = "error";
        app.textContent = "Unable to load specimen profile. Check your data source and try again.";
        console.error(error);
      }
    }

    init();
  </script>
</body>
</html>
